# Gatekeeper CI template — CTRL-SECRET secret scanning.
#
# Drop this job into your existing workflow (or use it standalone). It runs the
# gitleaks CLI directly rather than a wrapper action, so the scan range is
# explicit and force-push-proof.
#
# Why the CLI, not gitleaks-action: the action auto-computes a
# `<commit>^..<commit>` single-commit range whose parent can be orphaned by a
# rebase/force-push, producing `fatal: ambiguous argument '<sha>^..<sha>':
# unknown revision`, a 0-byte scan, and a false red X — with no way to override
# the range. The CLI lets us pin:
#   - PRs:  origin/<base>...HEAD  (three-dot merge-base range; a force-pushed
#           parent can't orphan it — the exact failure mode we hit in prod).
#   - push: --all                 (full history; authoritative backstop).
#
# The gate stays real: no --exit-code override (default 1 on any leak), no scope
# reduction, no `|| true`. Honors .gitleaks.toml via --config; --redact keeps any
# finding out of the logs.

name: secret-scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GITLEAKS_VERSION: 8.30.1   # pin the binary; bump deliberately
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so the merge-base with base is present

      - name: Install gitleaks (pinned + checksum-verified)
        run: |
          set -euo pipefail
          TARBALL="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          BASE_URL="https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}"
          # Download to a file (not piped to tar) so it can be hashed before extraction.
          curl -sSfL -o "${TARBALL}" "${BASE_URL}/${TARBALL}"
          curl -sSfL -o checksums.txt "${BASE_URL}/gitleaks_${GITLEAKS_VERSION}_checksums.txt"
          grep " ${TARBALL}\$" checksums.txt | sha256sum -c -
          tar -xz -C /usr/local/bin gitleaks -f "${TARBALL}"
          gitleaks version

      - name: gitleaks scan
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch --no-tags origin "${{ github.base_ref }}"
            LOG_OPTS="origin/${{ github.base_ref }}...HEAD"
          else
            LOG_OPTS="--all"
          fi
          echo "Scanning range: ${LOG_OPTS}"
          gitleaks git . \
            --config .gitleaks.toml \
            --log-opts="${LOG_OPTS}" \
            --redact \
            --verbose
